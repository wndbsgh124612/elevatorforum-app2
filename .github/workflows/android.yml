name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify google-services.json
        run: |
          test -f app/google-services.json || (echo "app/google-services.json 파일이 없습니다." && exit 1)

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.9
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle-8.9-bin.zip
          echo "$PWD/gradle-8.9/bin" >> $GITHUB_PATH

      - name: Accept licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ElevatorForum-stable-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
